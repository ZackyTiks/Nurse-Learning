<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referensi YouTube - Nurse Teaching</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased select-none">

    <header class="bg-teal-700 text-white p-5 shadow-md sticky top-0 z-50">
        <div class="max-w-3xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <a href="/" class="group block text-center sm:text-left transition">
                <h1 class="text-2xl font-bold group-hover:text-teal-100">Nurse Teaching 🩺</h1>
                <p class="text-xs text-teal-100 mt-0.5 group-hover:text-teal-200">Platform Belajar Anatomi Keperawatan</p>
            </a>
            <a href="/" class="w-full sm:w-auto text-center bg-teal-900 hover:bg-teal-950 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
                ⬅️ Kembali ke Beranda
            </a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 md:p-6 flex-grow w-full flex items-center justify-center my-6">
        
        <div class="text-center bg-white p-8 md:p-12 rounded-2xl border border-slate-200 shadow-sm max-w-md w-full class-preview">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 text-red-500 rounded-full text-3xl mb-4 animate-pulse">
                📺
            </div>
            <h2 class="text-xl font-black text-slate-800 uppercase tracking-wider">On Progress</h2>
            <p class="text-sm text-slate-500 mt-2 leading-relaxed">Halaman referensi channel YouTube terbaik lagi disiapin dan dikurasi biar materinya beneran daging. Tunggu tanggal mainnya ya!</p>
            
            <div class="mt-6 pt-6 border-t border-slate-100">
                <a href="/" class="inline-block text-sm font-bold text-teal-600 hover:text-teal-700 transition">
                    ← Balik ke Beranda Dulu
                </a>
            </div>
        </div>

    </main>

    <footer class="bg-slate-100 text-center p-4 border-t border-slate-200 text-xs text-slate-400 mt-auto">
        &copy; 2026 Nurse Teaching - Developed by Zacky Ricky.
    </footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'c') e.preventDefault();
        });
    </script>

</body>
</html>
